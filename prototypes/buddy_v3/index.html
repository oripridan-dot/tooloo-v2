<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooLoo OS | Buddy V3 (The Orchestrator)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060a;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --buddy-core: #00f2ff;
            --amber: #ffaa00;
            --green: #00ff88;
            --glass: rgba(18, 22, 28, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --mesh-standard: radial-gradient(at 0% 0%, hsla(185,100%,74%,0.15) 0, transparent 50%), 
                             radial-gradient(at 100% 100%, hsla(185,100%,74%,0.1) 0, transparent 50%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            background-image: var(--mesh-standard);
            color: #f0f4f8;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* SOTA Noise overlay */
        body::after {
            content: "";
            position: fixed;
            top: -150%; left: -150%; width: 300%; height: 300%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            pointer-events: none;
            z-index: 9999;
        }

        /* The Living DAG Core (Buddy) */
        .buddy-manifestation {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .buddy-core {
            width: 120px;
            height: 120px;
            background: var(--buddy-core);
            border-radius: 50%;
            filter: blur(20px);
            box-shadow: 0 0 60px var(--accent-glow);
            animation: pulse-core 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            z-index: 2;
        }

        @keyframes pulse-core {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        /* Orbiting Nodes (The Fleet) */
        .orbit-container {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate-orbit 20s linear infinite;
        }

        @keyframes rotate-orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .agent-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .agent-node span {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--accent);
        }

        .agent-node:nth-child(1) { top: 0; left: 50%; transform: translateX(-50%); }
        .agent-node:nth-child(2) { bottom: 0; left: 50%; transform: translateX(-50%); }
        .agent-node:nth-child(3) { left: 0; top: 50%; transform: translateY(-50%); }

        /* HUD Overlay */
        .hud {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            bottom: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .audit-alert {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid rgba(255, 170, 0, 0.2);
            padding: 20px;
            border-radius: 12px;
            max-width: 300px;
            backdrop-filter: blur(10px);
            font-size: 0.75rem;
            color: var(--amber);
            position: absolute;
            bottom: 40px;
            right: 0;
            display: none; /* Shown via JS */
            animation: slide-in 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slide-in {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .audit-alert strong { color: #fff; display: block; margin-bottom: 8px; }

        .fleet-telemetry {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--accent);
            opacity: 0.7;
        }

    </style>
</head>
<body>
    <div class="hud">
        <div class="hud-header">
            <div>BUDDY_ORCHESTRATOR // V3.0</div>
            <div>SOTA_DRIVE: ACTIVE</div>
        </div>
        
        <div class="fleet-telemetry" id="fleet-stats">
            NODES_LINKED: 0...<br>
            WORKSPACE_STATE: ANALYZING...
        </div>

        <div class="audit-alert" id="audit-popup">
            <strong>⚠️ SOTA DRIFT DETECTED</strong>
            The current active UI module uses flat gradients. Industry leaders (Linear/Vercel) have pivoted to high-saturation mesh gradients. Recommend 1.0 refinement.
        </div>
    </div>

    <div class="buddy-manifestation">
        <div class="buddy-core" id="buddy-core"></div>
        <div class="orbit-container">
            <div class="agent-node"><span>NEO</span></div>
            <div class="agent-node"><span>TRN</span></div>
            <div class="agent-node"><span>MPH</span></div>
        </div>
    </div>

    <script>
        const endpoint = '../fleet_command_v1/data.json';
        const core = document.getElementById('buddy-core');
        const stats = document.getElementById('fleet-stats');
        const audit = document.getElementById('audit-popup');

        async function syncBuddyData() {
            try {
                const response = await fetch(endpoint);
                const data = await response.json();
                
                // Update Core based on Cognitive Load
                const avgLoad = data.fleet.reduce((acc, a) => acc + a.cognitive_load, 0) / data.fleet.length;
                
                // Vibe shift: Blue (IDLE) -> Amber (REASONING) -> Red (HEAVY)
                if (avgLoad > 80) {
                    core.style.backgroundColor = '#ff3344';
                    core.style.boxShadow = '0 0 80px rgba(255, 51, 68, 0.6)';
                } else if (avgLoad > 50) {
                    core.style.backgroundColor = '#ffaa00';
                    core.style.boxShadow = '0 0 80px rgba(255, 170, 0, 0.6)';
                } else {
                    core.style.backgroundColor = '#00f2ff';
                    core.style.boxShadow = '0 0 80px rgba(0, 242, 255, 0.4)';
                }

                // Update Telemetry
                stats.innerHTML = `
                    NODES_LINKED: ${data.fleet.length}<br>
                    WORKSPACE_INSIGHT: ${data.fleet[0].last_insight}<br>
                    SOTA_BENCHMARK: ${data.sota.industry_sota.Cursor.capability}
                `;

                // Proactive Audit Simulation
                if (Math.random() > 0.8) {
                    audit.style.display = 'block';
                    setTimeout(() => audit.style.display = 'none', 10000);
                }

            } catch (e) {
                console.error("Buddy sync failed:", e);
            }
        }

        setInterval(syncBuddyData, 3000);
        syncBuddyData();
    </script>
</body>
</html>
