<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooLoo OS | Fleet Command (SOTA Cycle 1)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030407;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --amber: #ffaa00;
            --green: #00ff88;
            --red: #ff3344;
            --glass: rgba(18, 22, 28, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-dim: #8a94a6;
            --text-main: #f0f4f8;
            --mesh-gradient: radial-gradient(at 0% 0%, hsla(185,100%,74%,0.1) 0, transparent 50%), 
                             radial-gradient(at 50% 0%, hsla(38,100%,54%,0.05) 0, transparent 50%), 
                             radial-gradient(at 100% 0%, hsla(185,100%,74%,0.1) 0, transparent 50%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            background-image: var(--mesh-gradient);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        /* SOTA Noise Shader Overlay */
        body::after {
            content: "";
            position: fixed;
            top: -150%; left: -150%; width: 300%; height: 300%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
            animation: noise 1s steps(2) infinite;
        }

        @keyframes noise {
            0% { transform: translate(0,0); }
            10% { transform: translate(-5%,-5%); }
            20% { transform: translate(-10%,5%); }
            30% { transform: translate(5%,-10%); }
            40% { transform: translate(-5%,15%); }
            50% { transform: translate(-10%,5%); }
            60% { transform: translate(15%,0); }
            70% { transform: translate(0,10%); }
            80% { transform: translate(-15%,0); }
            90% { transform: translate(10%,5%); }
            100% { transform: translate(5%,0); }
        }

        /* SOTA Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 242, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 170, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.02) 0%, transparent 100%);
            z-index: -1;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-title {
            font-size: clamp(0.7rem, 2vw, 0.8rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .fleet-status {
            display: flex;
            gap: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }

        /* Fleet Grid */
        .fleet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            height: 100%;
        }

        /* Agent Card */
        .agent-card {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .agent-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 20px 50px rgba(0, 242, 255, 0.1);
        }

        .agent-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .agent-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .agent-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .status-badge {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            background: rgba(0, 255, 136, 0.1);
            color: var(--green);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .status-badge.reasoning {
            background: rgba(255, 170, 0, 0.1);
            color: var(--amber);
            border-color: rgba(255, 170, 0, 0.2);
            animation: pulse-amber 2s infinite;
        }

        @keyframes pulse-amber {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Telemetry Bar */
        .telemetry-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .telemetry-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .telemetry-bar-bg {
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            width: 100%;
            overflow: hidden;
        }

        .telemetry-bar-fill {
            height: 100%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Insight Box */
        .insight-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 16px;
            font-size: 0.75rem;
            color: var(--text-dim);
            line-height: 1.6;
            flex-grow: 1;
            font-family: 'JetBrains Mono', monospace;
        }

        .insight-box strong { color: var(--accent); margin-right: 4px; }

        /* Footer Telemetry */
        footer {
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            gap: 40px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">TooLoo Fleet Command // Tier-5 Ouroboros</div>
        <div class="fleet-status">
            <div>NODES: 03</div>
            <div>UPTIME: 99.98%</div>
            <div>SOTA_SYNC: ACTIVE</div>
        </div>
    </header>

    <div class="fleet-grid" id="fleet-grid">
        <!-- Agent cards will be injected here -->
    </div>

    <footer>
        <div>REASONING_BUDGET: ∞</div>
        <div>LATENCY_O1: 240ms</div>
        <div>DESIGN_CRITIC: 0.94</div>
    </footer>

    <script>
        const grid = document.getElementById('fleet-grid');

        async function updateTelemetry() {
            try {
                const response = await fetch('data.json');
                const state = await response.json();
                renderFleet(state.fleet);
                
                // Update footer telemetry with real data
                if (state.sota && state.sota.aesthetic_delta) {
                    document.querySelector('footer div:last-child').innerText = `DESIGN_CRITIC: ${state.sota.aesthetic_delta}`;
                }
            } catch (e) {
                console.error("Telemetry sync failed:", e);
            }
        }

        function renderFleet(agents) {
            grid.innerHTML = '';
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                
                // Extract real telemetry if available
                const realData = agent.real_telemetry ? 
                    Object.entries(agent.real_telemetry).map(([k,v]) => `<div>${k}: ${v}</div>`).join('') : 
                    'No real-world telemetry.';

                card.innerHTML = `
                    <div class="agent-header">
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-id">${agent.id}</div>
                        </div>
                        <div class="status-badge ${agent.status === 'REASONING' ? 'reasoning' : ''}">${agent.status}</div>
                    </div>
                    
                    <div class="telemetry-row">
                        <div class="telemetry-label">
                            <span>Cognitive Load</span>
                            <span>${agent.cognitive_load}%</span>
                        </div>
                        <div class="telemetry-bar-bg">
                            <div class="telemetry-bar-fill" style="width: ${agent.cognitive_load}%"></div>
                        </div>
                    </div>

                    <div class="insight-box">
                        <strong>// MISSN:</strong> ${agent.mission}<br><br>
                        <strong>// INSHT:</strong> ${agent.last_insight}<br><br>
                        <div style="font-size: 0.6rem; color: var(--accent); opacity: 0.8; margin-top: 8px;">
                            ${realData}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initial fetch and interval
        updateTelemetry();
        setInterval(updateTelemetry, 5000);
    </script>
</body>
</html>
