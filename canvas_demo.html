<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis Canvas - Intent Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #58a6ff;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 14px;
            color: #8b949e;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d;
            border-radius: 8px;
            width: 300px;
        }

        .log {
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #7ee787;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <h1>Fluid Intent Architecture</h1>
        <p>Live visualization of the AI Swarm processing a mandate.</p>
        <div class="status-box">
            <div style="color: #c9d1d9; font-weight: bold; margin-bottom: 8px;">System Log</div>
            <div class="log" id="system-log"></div>
        </div>
    </div>
    <canvas id="genesisCanvas"></canvas>

    <script>
        const canvas = document.getElementById('genesisCanvas');
        const ctx = canvas.getContext('2d');
        const logEl = document.getElementById('system-log');
        let width, height;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Canvas Simulation State
        const nodes = [];
        const edges = [];
        let time = 0;

        class Node {
            constructor(x, y, label, color, type) {
                this.targetX = x; this.targetY = y;
                this.x = width / 2; this.y = height / 2; // Start from center
                this.label = label;
                this.color = color;
                this.type = type; // 'intent', 'memory', 'task', 'solution'
                this.radius = type === 'intent' ? 30 : (type === 'solution' ? 40 : 15);
                this.alpha = 0;
                this.pulse = 0;
            }
            update() {
                // Ease into position
                this.x += (this.targetX - this.x) * 0.05;
                this.y += (this.targetY - this.y) * 0.05;
                if (this.alpha < 1) this.alpha += 0.02;
                this.pulse += 0.1;
            }
            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + Math.sin(this.pulse) * 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(this.label, this.x, this.y + this.radius + 15);
            }
        }

        function addLog(msg) {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            logEl.appendChild(div);
            if (logEl.children.length > 5) logEl.removeChild(logEl.firstChild);
        }

        // Orchestration Sequence
        setTimeout(() => {
            nodes.push(new Node(width / 2, height * 0.2, "User Intent: Build Feature", "#58a6ff", "intent"));
            addLog("Receptor: Intent captured.");
        }, 1000);

        setTimeout(() => {
            nodes.push(new Node(width / 3, height * 0.4, "Hot Memory Recalled", "#d2a8ff", "memory"));
            nodes.push(new Node((width / 3) * 2, height * 0.4, "Cold Context Embedded", "#d2a8ff", "memory"));
            edges.push({ from: 0, to: 1 }, { from: 0, to: 2 });
            addLog("Subconscious: Context retrieved.");
        }, 3000);

        setTimeout(() => {
            const colors = ['#7ee787', '#7ee787', '#7ee787', '#ff7b72']; // One validation task
            const tasks = ["Draft UI", "Wire API", "Setup DB", "Tribunal Validation"];
            for (let i = 0; i < 4; i++) {
                nodes.push(new Node(width * (0.2 + (i * 0.2)), height * 0.6, tasks[i], colors[i], "task"));
                edges.push({ from: 1, to: 3 + i }, { from: 2, to: 3 + i });
            }
            addLog("Swarm: N-Stroke execution fanned out.");
        }, 6000);

        setTimeout(() => {
            nodes.push(new Node(width / 2, height * 0.85, "Unified Solution", "#f1e05a", "solution"));
            for (let i = 0; i < 4; i++) {
                edges.push({ from: 3 + i, to: 7 }); // Connect tasks to solution
            }
            addLog("Refinement: Solution packaged for user.");
        }, 10000);

        function render() {
            ctx.fillStyle = 'rgba(13, 17, 23, 0.3)'; // Trail effect
            ctx.fillRect(0, 0, width, height);

            // Draw Edges
            edges.forEach(edge => {
                const n1 = nodes[edge.from];
                const n2 = nodes[edge.to];
                if (n1 && n2) {
                    ctx.beginPath();
                    ctx.moveTo(n1.x, n1.y);
                    // Add a slight curve
                    ctx.quadraticCurveTo(n1.x, n2.y - 50, n2.x, n2.y);
                    ctx.strokeStyle = `rgba(139, 148, 158, ${Math.min(n1.alpha, n2.alpha) * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Animated data particle along edge
                    const progress = (time * 0.002 + edge.from * 0.1) % 1;
                    const px = n1.x + (n2.x - n1.x) * progress;
                    const py = n1.y + (n2.y - n1.y) * progress;
                    ctx.beginPath();
                    ctx.arc(px, py, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                }
            });

            // Draw Nodes
            nodes.forEach(node => node.update());
            nodes.forEach(node => node.draw());

            time++;
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>

</html>
