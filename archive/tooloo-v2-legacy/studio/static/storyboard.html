<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TooLoo · Storyboard UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════════════════════════════════
       STORYBOARD DESIGN TOKENS
       ══════════════════════════════════════════════════════════════════════ */
    :root {
      --bg: #0A0A12;
      --bg-card: rgba(18, 18, 30, 0.7);
      --border: rgba(108, 99, 255, 0.2);
      --text: #F0F0F8;
      --text-muted: #8E8EAE;
      --primary: #6C63FF;
      --cyan: #00E5FF;
      --font: 'Inter', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 10, 18, 0.9);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    
    .logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--cyan); }
    
    .status-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(0, 229, 255, 0.3);
      color: var(--cyan);
      background: rgba(0, 229, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 8px var(--cyan);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── FILMSTRIP LAYOUT ── */
    main {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 40px;
      display: flex;
      gap: 32px;
      scroll-behavior: smooth;
    }
    
    /* Hide scrollbar for clean look */
    main::-webkit-scrollbar { display: none; }
    main { -ms-overflow-style: none; scrollbar-width: none; }

    .filmstrip-card {
      min-width: 800px;
      max-width: 800px;
      height: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      animation: slide-in 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(50px) scale(0.98); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }

    /* LEFT: Image Visualization */
    .card-visual {
      flex: 1;
      border-right: 1px solid var(--border);
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .card-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease-in;
    }

    .card-visual img.loaded {
      opacity: 1;
    }

    .visual-skeleton {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #111, #1a1a2e, #111);
      background-size: 200% 100%;
      animation: skeleton-loading 2s infinite linear;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    
    @keyframes skeleton-loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* RIGHT: Narrative Target */
    .card-narrative {
      flex: 1;
      padding: 32px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .timeframe-badge {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .narrative-text {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
      flex: 1;
    }

    .typewriter-cursor {
      display: inline-block;
      width: 8px;
      height: 18px;
      background: var(--cyan);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* Accordion for Code */
    .code-accordion {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    
    .code-accordion summary {
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: color 0.2s;
    }
    
    .code-accordion summary::after {
      content: '+';
      font-size: 16px;
      color: var(--cyan);
    }
    
    .code-accordion[open] summary::after { content: '-'; }
    .code-accordion summary:hover { color: var(--text); }
    
    .code-block {
      margin-top: 16px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-family: var(--mono);
      font-size: 11px;
      color: #A3A3C2;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* Input Footer */
    footer {
      padding: 24px 40px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }
    
    .input-bar {
      display: flex;
      gap: 16px;
      max-width: 800px;
      margin: 0 auto;
    }
    
    input[type="text"] {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--cyan); }
    
    button {
      background: var(--cyan);
      color: #000;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      padding: 0 24px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 14px;
      transition: transform 0.1s, background 0.2s;
    }
    button:hover {
      background: #fff;
      transform: translateY(-2px);
    }

  </style>
</head>
<body>

  <header>
    <div class="logo">TooLoo <span>Storyboard</span></div>
    <div class="status-pill"><div class="status-dot"></div> <span id="conn-status">LISTENING</span></div>
  </header>

  <main id="filmstrip-container">
    <!-- Initial empty state -->
    <div style="margin: auto; color: var(--text-muted); font-size: 14px; letter-spacing: 1px; text-transform: uppercase;">
      Awaiting Mandate Initialization...
    </div>
  </main>

  <footer>
    <form id="mandate-form" class="input-bar">
      <input type="text" id="cmd-input" placeholder="Give Buddy an architectural mandate..." autocomplete="off"/>
      <button type="submit">Execute</button>
    </form>
  </footer>

  <script>
    // ══════════════════════════════════════════════════════════════════════
    // DYNAMIC BUFFER QUEUE (Time Dilation Engine)
    // ══════════════════════════════════════════════════════════════════════
    class DynamicBufferQueue {
      constructor(onCharRender, onComplete) {
        this.queue = [];
        this.isTyping = false;
        this.onCharRender = onCharRender;
        this.onComplete = onComplete;
        this.typeSpeedMs = 25; // Milliseconds per token/char mapping
      }

      push(text) {
        // Break text into arrays of chunks (characters or words).
        const chars = text.split('');
        this.queue.push(...chars);
        if (!this.isTyping) {
          this.processQueue();
        }
      }

      processQueue() {
        if (this.queue.length === 0) {
          this.isTyping = false;
          if (this.onComplete) this.onComplete();
          return;
        }

        this.isTyping = true;
        const char = this.queue.shift();
        this.onCharRender(char);

        // Dynamic speed based on buffer size
        let speed = this.queue.length > 100 ? 5 : this.typeSpeedMs;
        
        setTimeout(() => this.processQueue(), speed);
      }
    }

    // ══════════════════════════════════════════════════════════════════════
    // TRANSLATION MATRIX (Cognitive Math -> Imagen Prompt)
    // ══════════════════════════════════════════════════════════════════════
    function translateCognitiveState(weights) {
      const w = weights || {};
      const foresight = w.Architectural_Foresight || 0.5;
      const precision = w.Syntax_Precision || 0.5;
      const rca = w.Root_Cause_Analysis || 0.5;

      let prompt = "A stylized 3D animation still of Buddy, a friendly robotic assistant, ";

      if (foresight > 0.8) {
        prompt += "standing over a glowing holographic blueprint of a building, pointing at a structural flaw, cinematic lighting.";
      } else if (precision > 0.8) {
        prompt += "wearing magnifying goggles, carefully soldering a microchip on a glowing motherboard.";
      } else if (rca > 0.8) {
        prompt += "holding a glowing magnifying glass, following a trail of digital footprints through a dark, neon-lit server room.";
      } else {
        prompt += "typing code at a futuristic multi-monitor workstation, glowing screens reflection.";
      }
      
      return prompt;
    }

    // ══════════════════════════════════════════════════════════════════════
    // UI CONTROLLER
    // ══════════════════════════════════════════════════════════════════════
    const container = document.getElementById('filmstrip-container');
    let currentCard = null;
    let currentNarrativeEl = null;
    let currentCodeEl = null;
    let currentBuffer = null;

    function createNewCard(title) {
        // Remove empty state
        if (container.children.length === 1 && !container.children[0].classList.contains('filmstrip-card')) {
            container.innerHTML = '';
        }

        const card = document.createElement('div');
        card.className = 'filmstrip-card';
        
        card.innerHTML = `
          <div class="card-visual">
            <div class="visual-skeleton" id="skeleton-${title}">RENDERING...</div>
            <img id="img-${title}" src="" alt="Buddy Visualization" />
          </div>
          <div class="card-narrative">
            <div class="timeframe-badge">Meso Timeframe: ${title}</div>
            <div class="narrative-text" id="text-${title}"><span class="typewriter-cursor"></span></div>
            
            <details class="code-accordion">
              <summary>View Execution Syntax</summary>
              <div class="code-block" id="code-${title}"></div>
            </details>
          </div>
        `;

        container.appendChild(card);
        // Auto scroll to the new card
        container.scrollLeft = container.scrollWidth;

        currentCard = card;
        
        const narrativeEl = document.getElementById(`text-${title}`);
        currentCodeEl = document.getElementById(`code-${title}`);
        
        // Setup Buffer
        currentBuffer = new DynamicBufferQueue((char) => {
            // Insert character before the cursor
            const cursor = narrativeEl.querySelector('.typewriter-cursor');
            const textNode = document.createTextNode(char);
            narrativeEl.insertBefore(textNode, cursor);
            // keep scrolled down
            narrativeEl.scrollTop = narrativeEl.scrollHeight;
        });

        return card;
    }

    async function triggerImageGen(cardId, weights) {
        const prompt = translateCognitiveState(weights);
        try {
            const res = await fetch('/v2/storyboard/image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            const data = await res.json();
            if (data.image_base64) {
                const img = document.getElementById(`img-${cardId}`);
                const skeleton = document.getElementById(`skeleton-${cardId}`);
                if (img) {
                    img.src = "data:image/png;base64," + data.image_base64;
                    img.onload = () => {
                        img.classList.add('loaded');
                        if(skeleton) skeleton.style.display = 'none';
                    };
                }
            }
        } catch (e) {
            console.error("Image gen failed", e);
        }
    }

    // ══════════════════════════════════════════════════════════════════════
    // SSE LISTENER MAPPER
    // ══════════════════════════════════════════════════════════════════════
    let _sse = null;
    
    function connectSSE() {
        if (_sse) _sse.close();
        _sse = new EventSource('/v2/events');
        
        let cardIdCount = 0;

        _sse.onmessage = (e) => {
            const ev = JSON.parse(e.data);
            
            // Map SSE events into the Narrative logic
            
            if (ev.type === 'n_stroke_start' || ev.type === 'pipeline_start' || ev.type === 'midflight') {
                cardIdCount++;
                const cardId = 'Task_' + cardIdCount;
                createNewCard(cardId);
                
                // Immediately request the image using default or incoming weights
                // If CognitiveState weights aren't strictly broadcast, we simulate for demo layout:
                const simWeights = {
                    Architectural_Foresight: Math.random() > 0.5 ? 0.9 : 0.4,
                    Syntax_Precision: Math.random() > 0.5 ? 0.9 : 0.4
                };
                triggerImageGen(cardId, simWeights);

                currentBuffer.push(`Initializing Execution Scope... \n`);
            }

            if (ev.type === 'conversation' && ev.conversation && currentBuffer) {
                currentBuffer.push(ev.conversation.response + " ");
            }

            if (ev.message || ev.text) {
                const txt = ev.message || ev.text;
                if (currentBuffer) {
                    currentBuffer.push(txt + "\n");
                }
                if (currentCodeEl && txt.includes("```")) {
                     currentCodeEl.textContent += "\\n" + txt;
                }
            }
            
            // Raw code outputs via standard VLT patches go into the accordion
            if (ev.type === 'vlt_patch' && currentCodeEl) {
                currentCodeEl.textContent += "\\n--- VLT PATCH APPLIED ---\\n";
            }
        };

        _sse.onopen = () => document.getElementById('conn-status').textContent = 'ACTIVE';
        _sse.onerror = () => document.getElementById('conn-status').textContent = 'RECONNECTING...';
    }

    connectSSE();

    // Form Submitter
    document.getElementById('mandate-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('cmd-input');
        const text = input.value.trim();
        if (!text) return;
        
        input.value = '';
        
        // We trigger an exploratory pipeline call that forces execution
        await fetch('/v2/pipeline', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: text, session_id: "sb-" + Date.now(), max_iterations: 3})
        });
    });

  </script>
</body>
</html>
