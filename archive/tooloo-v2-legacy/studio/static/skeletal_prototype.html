<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooLoo Skeletal Prototypes</title>
    <style>
        :root {
            --bg-color: #050505;
            --core-glow: rgba(0, 240, 255, 0.4);
            --accent-color: #00f0ff;
            --alert-color: #ff3e3e;
            --thinking-color: #bd00ff;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- THE STAGE --- */
        #stage {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- THE SKELETON (SVG) --- */
        #buddy-skeleton {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px var(--core-glow));
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* RIGGING: IDLE PULSE */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        @keyframes orbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes scanning {
            0% { transform: translateY(-5px); }
            50% { transform: translateY(5px); }
            100% { transform: translateY(-5px); }
        }

        #buddy-core {
            animation: breathe 4s ease-in-out infinite;
            transform-origin: center;
            fill: url(#grad-core);
        }

        #buddy-orbitals {
            animation: orbit 20s linear infinite;
            transform-origin: center;
            stroke-dasharray: 5, 5;
        }

        #buddy-eye {
            fill: #fff;
            transition: all 0.3s ease;
        }

        /* --- STATE OVERRIDES --- */

        /* ANALYZING STATE */
        .state-analyzing #buddy-skeleton {
            filter: drop-shadow(0 0 30px var(--thinking-color));
        }
        .state-analyzing #buddy-core {
            animation: breathe 1s ease-in-out infinite; /* Faster breathing */
            fill: var(--thinking-color);
        }
        .state-analyzing #buddy-orbitals {
            animation: orbit 2s linear infinite; /* High speed orbit */
            stroke: var(--thinking-color);
        }
        .state-analyzing #buddy-eye {
            transform: scaleY(1.5);
            fill: #fff;
        }

        /* ALERT/ERROR STATE */
        .state-alert #buddy-skeleton {
            filter: drop-shadow(0 0 30px var(--alert-color));
        }
        .state-alert #buddy-core {
            animation: none;
            transform: scale(1.1);
            fill: var(--alert-color);
        }
        .state-alert #buddy-eye {
            transform: scale(0.5);
            fill: #000;
        }

        /* --- UI CONTROLS --- */
        .controls {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent-color);
        }

        button.active {
            background: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        #status-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }
    </style>
</head>
<body class="state-idle">

    <div id="stage">
        <svg id="buddy-skeleton" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="grad-core" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" style="stop-color:white; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:var(--accent-color); stop-opacity:0.5" />
                </radialGradient>
            </defs>

            <!-- ORBITALS (The "Shield/Processing Rings") -->
            <circle id="buddy-orbitals" cx="100" cy="100" r="80" fill="none" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1" />
            <circle cx="100" cy="100" r="60" fill="none" stroke="rgba(0, 240, 255, 0.1)" stroke-width="0.5" />

            <!-- CORE (The "Brain") -->
            <circle id="buddy-core" cx="100" cy="100" r="30" />

            <!-- EYE (The Expressive Part) -->
            <g id="buddy-eye-group">
                <ellipse id="buddy-eye" cx="100" cy="95" rx="8" ry="8" />
            </g>
        </svg>
    </div>

    <div class="controls">
        <button onclick="setState('idle')" id="btn-idle" class="active">Idle</button>
        <button onclick="setState('analyzing')" id="btn-analyzing">Analyzing</button>
        <button onclick="setState('alert')" id="btn-alert">Alert</button>
    </div>

    <div id="status-text">SYSTEM_READY // SSE_SIMULATED: IDLE</div>

    <script>
        function setState(state) {
            // Update Body Class
            document.body.className = 'state-' + state;

            // Update Buttons
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + state).classList.add('active');

            // Update Text
            const status = document.getElementById('status-text');
            status.innerText = `SYSTEM_STATE: ${state.toUpperCase()} // LATENCY: 1ms // PHYSICS: LOCKED`;
        }
    </script>
</body>
</html>
