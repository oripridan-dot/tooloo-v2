steps:
  # 1. Create GCS Workspace Bucket (Rule 17: Physical Preservation)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil mb -p $PROJECT_ID -l me-west1 gs://too-loo-workspace-v4-$PROJECT_ID || echo "Bucket already exists."

  # 2. Build the Sovereign Hub Container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.hub', '-t', 'gcr.io/$PROJECT_ID/tooloo-v4-hub:$_IMAGE_TAG', '.']
  
  # 3. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tooloo-v4-hub:$_IMAGE_TAG']
    
  # 4. Deploy to Cloud Run (Industrial Tier)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tooloo-v4-hub'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tooloo-v4-hub:$_IMAGE_TAG'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '4'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'WORKSPACE_ROOT=/app,GCP_REGION=me-west1,GCP_PROJECT_ID=$PROJECT_ID,LEAN_MODE=false,CLOUD_NATIVE_WORKSPACE=true,HUB_VERSION=4.2.0,DEFAULT_ORGAN=system_organ'

images:
  - 'gcr.io/$PROJECT_ID/tooloo-v4-hub:$_IMAGE_TAG'
