steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tooloo-v2:$_IMAGE_TAG', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tooloo-v2:$_IMAGE_TAG']
    
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'tooloo-v2'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tooloo-v2:$_IMAGE_TAG'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--set-env-vars'
      - 'WORKSPACE_ROOT=/app,GCP_REGION=us-central1,GCP_PROJECT_ID=$PROJECT_ID,LEAN_MODE=true,STARTUP_TIMEOUT=120'

images:
  - 'gcr.io/$PROJECT_ID/tooloo-v2:$_IMAGE_TAG'
