{% macro render_pricing_tier(tier, recommended) %}
<div class="pricing-tier bg-white dark:bg-gray-700 p-8 rounded-xl shadow-lg flex flex-col justify-between {{ 'border-4 border-blue-500 scale-105' if recommended }}">
    <div>
        <h3 class="text-3xl font-bold mb-4">{{ tier.name }}</h3>
        <p class="text-5xl font-extrabold mb-6">${{ tier.price }}<span class="text-xl font-normal">/month</span></p>
        <ul class="space-y-3 mb-8 text-gray-600 dark:text-gray-300">
            {% for feature in tier.features %}
            <li class="flex items-center"><svg class="w-5 h-5 mr-3 text-blue-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M16.707 4.293a1 1 0 010 1.414l-9 9a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L6 10.586 15.293 5.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg> {{ feature }}</li>
            {% endfor %}
        </ul>
    </div>
    <a href="#" class="w-full text-center block bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-6 rounded-lg transition duration-300 ease-in-out transform hover:-translate-y-1 hover:scale-105">
        Choose Plan
    </a>
</div>
{% endmacro %}
