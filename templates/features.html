{% macro render_feature(feature) %}
<div class="bg-white dark:bg-gray-700 p-8 rounded-xl shadow-lg text-center opacity-0 translate-y-20 transition-all duration-700 ease-out feature-item">
    <div class="text-5xl text-blue-600 dark:text-blue-400 mb-4">{{ feature.icon }}</div>
    <h3 class="text-2xl font-bold mb-4">{{ feature.title }}</h3>
    <p class="text-lg text-gray-600 dark:text-gray-300 leading-relaxed">{{ feature.description }}</p>
</div>
{% endmacro %}
