{% from 'pricing.html' import render_pricing_tier %}
<section id="pricing" class="py-20 px-8 bg-gray-100 dark:bg-gray-800">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold text-center mb-12">Flexible Pricing Plans</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for tier in pricing_tiers %}
                {{ render_pricing_tier(tier, tier.recommended) }}
            {% endfor %}
        </div>
    </div>
</section>
