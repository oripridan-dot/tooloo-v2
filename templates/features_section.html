{% from 'features.html' import render_feature %}
<section id="features" class="py-20 px-8 bg-gray-100 dark:bg-gray-800">
    <div class="max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold text-center mb-12">Why Our New Feature Excels</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            {% for feature in features %}
                {{ render_feature(feature) }}
            {% endfor %}
        </div>
    </div>
</section>
