{% from 'testimonials.html' import render_testimonial %}
<section id="testimonials" class="py-24 px-8 bg-white dark:bg-gray-800">
    <div class="max-w-4xl mx-auto text-center">
        <h2 class="text-4xl font-bold mb-12">What Our Customers Say</h2>
        <div id="testimonial-carousel" class="relative">
            <div class="carousel-inner flex relative">
                {% for testimonial in testimonials %}
                    {{ render_testimonial(testimonial, loop.first) }}
                {% endfor %}
            </div>
            <div class="carousel-indicators absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-4">
                {% for testimonial in testimonials %}
                <button class="indicator-dot w-3 h-3 rounded-full bg-gray-400 hover:bg-gray-600 transition {{ 'bg-blue-500 hover:bg-blue-600' if loop.first }}" data-slide-index="{{ loop.index0 }}"></button>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
