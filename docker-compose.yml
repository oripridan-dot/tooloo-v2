services:
  tooloo-live:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
      - PORT=8080
      - STUDIO_HOST=0.0.0.0
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    restart: always

  tooloo-evolution:
    build: .
    command: uv run python scripts/ouroboros_daemon.py
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/service-account.json
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    restart: always
