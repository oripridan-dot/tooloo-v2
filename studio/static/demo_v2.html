<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy.studio — AI Design Studio V2 Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body{font-family:'Inter',sans-serif;}
        .glass-panel{background:rgba(30,41,59,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);}
        .canvas-bg{background-image:radial-gradient(circle at 30% 50%,#1e293b 0%,#0f172a 100%);}
        ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#334155;border-radius:10px;}
        .active-pill{background-color:rgba(37,99,235,.2)!important;color:#60a5fa!important;border-color:rgba(59,130,246,.5)!important;font-weight:500;}
        @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        .shimmer-bg{position:relative;overflow:hidden;background:#0f172a;}.shimmer-bg::after{content:'';position:absolute;top:0;right:0;bottom:0;left:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 2s infinite;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.animate-in{animation:fadeInUp .3s ease forwards;}
        .phase-dot{width:10px;height:10px;border-radius:50%;transition:all .4s ease;}.phase-dot.active{box-shadow:0 0 12px currentColor;transform:scale(1.3);}.phase-dot.completed{opacity:.4;}
        .phase-line{height:2px;flex:1;transition:background .4s ease;}
        #prototype-frame{border:none;border-radius:12px;background:white;transition:opacity .5s ease;}
        .suggestion-card{background:linear-gradient(135deg,rgba(37,99,235,.15),rgba(124,58,237,.15));border:1px solid rgba(96,165,250,.3);animation:fadeInUp .4s ease forwards;}
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen overflow-hidden flex">
    <div class="w-[380px] flex flex-col border-r border-slate-800 bg-slate-900/50 relative z-10">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-xs font-bold shadow-lg shadow-blue-500/20">B</div>
                <div><h1 class="text-sm font-semibold text-white">Buddy<span class="text-blue-400">.studio</span></h1>
                <div id="phase-label" class="text-[10px] text-slate-400 uppercase tracking-wider font-medium">💡 Discover</div></div>
            </div>
            <div class="text-[10px] px-2 py-0.5 bg-green-500/20 text-green-400 rounded-full border border-green-500/30 flex items-center gap-1"><div class="w-1 h-1 rounded-full bg-current"></div>Live</div>
        </div>
        <div class="px-4 py-3 flex items-center gap-1 border-b border-slate-800/50" id="phase-bar">
            <div class="phase-dot active bg-blue-500 text-blue-500" id="dot-discover"></div>
            <div class="phase-line bg-slate-700" id="line-discover"></div>
            <div class="phase-dot bg-slate-600 text-violet-500" id="dot-design"></div>
            <div class="phase-line bg-slate-700" id="line-design"></div>
            <div class="phase-dot bg-slate-600 text-emerald-500" id="dot-prototype"></div>
            <div class="phase-line bg-slate-700" id="line-prototype"></div>
            <div class="phase-dot bg-slate-600 text-red-500" id="dot-ship"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4" id="chat-history">
            <div class="flex items-start gap-2.5 animate-in">
                <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-[10px] font-bold shrink-0 shadow-lg shadow-blue-500/20">B</div>
                <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] border border-slate-700/50 shadow-lg"><p class="text-[13px] leading-relaxed">Hey! I'm Buddy, your AI design partner. Tell me what you're building — I'll guide us from concept to a working prototype.</p></div>
            </div>
        </div>
        <div class="p-4 border-t border-slate-800 bg-slate-900">
            <div id="status-text" class="text-[10px] text-blue-400 mb-1.5 h-4 transition-opacity opacity-0 italic font-medium"></div>
            <div class="relative">
                <input type="text" id="prompt-input" class="w-full bg-slate-800 border border-slate-700 text-[13px] rounded-xl px-4 py-3 pr-12 focus:outline-none focus:border-blue-500/50 transition-all text-white placeholder-slate-500" placeholder="Tell Buddy what you're imagining...">
                <button id="send-btn" class="absolute right-1.5 top-1.5 bg-blue-600 hover:bg-blue-500 text-white p-2 rounded-lg transition-all active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>
    <div class="flex-1 flex flex-col relative canvas-bg">
        <div class="flex-1 p-6 flex items-center justify-center relative">
            <div id="canvas-container" class="relative w-full h-full rounded-2xl overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,.4)] border border-slate-700/50 transition-all duration-500 flex items-center justify-center bg-slate-900/50">
                <div id="placeholder" class="flex flex-col items-center gap-4 text-slate-500 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="opacity-30"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    <span class="text-xs font-medium tracking-widest uppercase">Chat with Buddy to begin</span>
                </div>
                <img id="main-image" src="" alt="" class="absolute inset-0 w-full h-full object-contain transition-opacity duration-500 opacity-0 z-10">
                <iframe id="prototype-frame" class="absolute inset-0 w-full h-full opacity-0 z-0" sandbox="allow-scripts"></iframe>
                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-20">
                    <div class="flex flex-col items-center gap-3"><div class="w-8 h-8 border-[3px] border-blue-500 border-t-transparent rounded-full animate-spin"></div><span id="loading-text" class="text-xs font-medium text-blue-400 tracking-wider uppercase">Processing</span></div>
                </div>
            </div>
        </div>
        <div class="h-16 glass-panel absolute bottom-6 left-6 right-6 rounded-xl flex items-center px-5 gap-4 shadow-2xl z-30">
            <span class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Style</span>
            <button class="px-2.5 py-1 text-[11px] bg-slate-800 text-blue-400 border border-blue-500/50 rounded-lg font-medium transition whitespace-nowrap active-pill">Minimalist</button>
            <button class="px-2.5 py-1 text-[11px] bg-slate-800 text-slate-300 border border-slate-700 rounded-lg transition whitespace-nowrap">Corporate</button>
            <div class="w-px h-8 bg-slate-700 shrink-0"></div>
            <span class="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">Ratio</span>
            <button class="px-2.5 py-1 text-[11px] bg-slate-800 text-slate-300 border border-slate-700 rounded-lg transition">1:1</button>
            <button class="px-2.5 py-1 text-[11px] bg-slate-800 text-blue-400 border border-blue-500/50 rounded-lg font-medium transition active-pill">16:9</button>
            <div class="flex-1"></div>
            <button id="export-btn" class="px-4 py-2 bg-white text-slate-900 font-semibold text-xs rounded-lg hover:bg-slate-200 transition shadow-lg flex items-center gap-1.5 shrink-0 opacity-30 cursor-not-allowed">Export</button>
        </div>
    </div>

    <script>
    const chat = document.getElementById('chat-history');
    const input = document.getElementById('prompt-input');
    const statusText = document.getElementById('status-text');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const mainImage = document.getElementById('main-image');
    const protoFrame = document.getElementById('prototype-frame');
    const placeholder = document.getElementById('placeholder');
    const phaseLabel = document.getElementById('phase-label');
    let turn = 0;

    const PHASES = ['discover','design','prototype','ship'];
    const PHASE_LABELS = {discover:'💡 Discover',design:'🎨 Design',prototype:'⚙️ Prototype',ship:'🚀 Ship'};

    function setPhase(p) {
        phaseLabel.textContent = PHASE_LABELS[p];
        const idx = PHASES.indexOf(p);
        PHASES.forEach((ph,i) => {
            const dot = document.getElementById('dot-'+ph);
            dot.classList.remove('active','completed');
            if (i < idx) dot.classList.add('completed');
            else if (i === idx) dot.classList.add('active');
        });
    }

    function buddyMsg(t) {
        const el = document.createElement('div');
        el.className='flex items-start gap-2.5 animate-in';
        el.innerHTML=`<div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-[10px] font-bold shrink-0 shadow-lg shadow-blue-500/20">B</div><div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] border border-slate-700/50 shadow-lg"><p class="text-[13px] leading-relaxed">${t}</p></div>`;
        chat.appendChild(el); chat.scrollTop=chat.scrollHeight;
    }
    function userMsg(t) {
        const el=document.createElement('div');
        el.className='flex items-start gap-2.5 flex-row-reverse animate-in';
        el.innerHTML=`<div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-[10px] font-bold shrink-0">U</div><div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg shadow-blue-900/20"><p class="text-[13px] leading-relaxed">${t}</p></div>`;
        chat.appendChild(el); chat.scrollTop=chat.scrollHeight;
    }
    function phaseBtn(phase, reason) {
        const el=document.createElement('div');
        el.className='px-3 animate-in';
        el.innerHTML=`<div class="suggestion-card rounded-xl p-3 mt-1 mb-1"><p class="text-[12px] text-slate-300 mb-2">${reason}</p><button onclick="acceptPhase('${phase}')" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-[12px] font-medium rounded-lg transition-all active:scale-95 shadow-lg shadow-blue-500/20">Move to ${PHASE_LABELS[phase]} →</button></div>`;
        chat.appendChild(el); chat.scrollTop=chat.scrollHeight;
    }

    const SAMPLE_PROTO = `<!DOCTYPE html><html><head><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff}header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}nav a{color:#94a3b8;margin-left:28px;font-size:13px;font-weight:500;transition:color .2s}nav a:hover{color:#fff}.hero{text-align:center;padding:100px 40px 60px;max-width:800px;margin:0 auto}.hero h1{font-size:56px;font-weight:700;line-height:1.1;margin-bottom:20px;background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero p{color:#64748b;font-size:18px;line-height:1.7;margin-bottom:40px}.cta{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border-radius:12px;font-weight:600;font-size:15px;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 8px 30px rgba(59,130,246,.3)}.cta:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(59,130,246,.4)}.features{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:60px 40px;max-width:1100px;margin:0 auto}.card{background:rgba(30,41,59,.5);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:32px;transition:transform .3s,border-color .3s}.card:hover{transform:translateY(-4px);border-color:rgba(96,165,250,.3)}.card h3{font-size:16px;font-weight:600;margin-bottom:10px}.card p{color:#64748b;font-size:13px;line-height:1.6}.icon{width:40px;height:40px;background:linear-gradient(135deg,rgba(59,130,246,.2),rgba(139,92,246,.2));border-radius:10px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;font-size:18px}footer{text-align:center;padding:40px;color:#334155;font-size:12px;border-top:1px solid rgba(255,255,255,.05)}</style></head><body><header><div class="logo">NovaPay</div><nav><a href="#">Features</a><a href="#">Pricing</a><a href="#">About</a><a href="#">Contact</a></nav></header><main><div class="hero"><h1>Payments that move at the speed of thought</h1><p>Accept payments globally with zero friction. Built for teams who refuse to compromise on speed or design.</p><button class="cta">Start for free</button></div><div class="features"><div class="card"><div class="icon">⚡</div><h3>Instant Settlement</h3><p>Funds hit your account in under 30 seconds. No waiting, no batching, no nonsense.</p></div><div class="card"><div class="icon">🌍</div><h3>195 Countries</h3><p>Accept payments from anywhere on Earth. We handle compliance so you don't have to.</p></div><div class="card"><div class="icon">🔒</div><h3>Bank-grade Security</h3><p>PCI DSS Level 1 certified with end-to-end encryption and real-time fraud detection.</p></div></div></main><footer>© 2026 NovaPay Inc. All rights reserved.</footer></body></html>`;

    window.acceptPhase = function(p) {
        setPhase(p);
        if (p === 'prototype') {
            statusText.textContent = 'Building interactive prototype...';
            statusText.classList.remove('opacity-0');
            loadingOverlay.classList.remove('opacity-0');
            loadingText.textContent = 'Building...';
            document.getElementById('canvas-container').classList.add('shimmer-bg');
            setTimeout(() => {
                buddyMsg("I've turned your design into a fully interactive prototype. Try hovering the cards — they have micro-animations. The header is sticky, and the CTA has a gradient glow effect.");
                protoFrame.srcdoc = SAMPLE_PROTO;
                mainImage.classList.add('opacity-0');
                mainImage.classList.remove('z-10');
                protoFrame.classList.remove('opacity-0');
                protoFrame.classList.add('z-10');
                placeholder.classList.add('opacity-0');
                document.getElementById('canvas-container').classList.remove('shimmer-bg');
                loadingOverlay.classList.add('opacity-0');
                statusText.classList.add('opacity-0');
                document.getElementById('export-btn').classList.remove('opacity-30','cursor-not-allowed');
                setTimeout(() => buddyMsg("What would you like to refine? I could make the hero section taller, add a testimonials section, or switch to a light theme."), 1500);
            }, 2500);
        }
    };

    function handleSend() {
        const text = input.value.trim();
        if (!text) return;
        userMsg(text);
        input.value = '';
        turn++;
        loadingOverlay.classList.remove('opacity-0');
        document.getElementById('canvas-container').classList.add('shimmer-bg');
        statusText.textContent = 'Buddy is thinking...';
        statusText.classList.remove('opacity-0');

        if (turn === 1) {
            // Discover → clarify
            setTimeout(() => {
                loadingOverlay.classList.add('opacity-0');
                document.getElementById('canvas-container').classList.remove('shimmer-bg');
                statusText.classList.add('opacity-0');
                buddyMsg("A fintech landing page — great choice. I'm thinking dark theme with subtle gradients, a bold hero section, and trust-focused feature cards. What name should the company have? And should I lean more premium/corporate or modern/startup?");
            }, 1500);
        } else if (turn === 2) {
            // Discover → suggest Design
            setTimeout(() => {
                loadingOverlay.classList.add('opacity-0');
                document.getElementById('canvas-container').classList.remove('shimmer-bg');
                statusText.classList.add('opacity-0');
                buddyMsg("Perfect — I have a clear picture now. Dark background, blue-to-purple gradients, modern startup feel with generous whitespace. Let me generate the first visual mockup.");
                setTimeout(() => {
                    setPhase('design');
                    statusText.textContent = 'Generating mockup...';
                    statusText.classList.remove('opacity-0');
                    loadingOverlay.classList.remove('opacity-0');
                    loadingText.textContent = 'Rendering...';
                    document.getElementById('canvas-container').classList.add('shimmer-bg');
                    setTimeout(() => {
                        mainImage.src = '/sneaker_dark.png';
                        mainImage.onload = () => {
                            mainImage.classList.remove('opacity-0');
                            placeholder.classList.add('opacity-0');
                            document.getElementById('canvas-container').classList.remove('shimmer-bg');
                            loadingOverlay.classList.add('opacity-0');
                            statusText.classList.add('opacity-0');
                            setTimeout(() => {
                                buddyMsg("Here's the initial direction. The dark background with gradient accents gives it that premium fintech feel.");
                                setTimeout(() => phaseBtn('prototype', "This design is looking solid. Want me to turn it into a real, interactive prototype you can click and scroll through?"), 1500);
                            }, 800);
                        };
                    }, 2000);
                }, 1500);
            }, 1500);
        }
    }

    document.getElementById('send-btn').addEventListener('click', handleSend);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
