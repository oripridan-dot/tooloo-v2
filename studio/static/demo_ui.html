<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Creation Studio - DEMO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .canvas-bg {
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .active-pill {
            background-color: rgba(37, 99, 235, 0.2);
            color: #60a5fa;
            border-color: rgba(59, 130, 246, 0.5);
            font-weight: 500;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .shimmer-bg {
            position: relative;
            overflow: hidden;
            background: #0f172a;
        }
        .shimmer-bg::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 h-screen overflow-hidden flex">

    <div class="w-1/3 flex flex-col border-r border-slate-800 bg-slate-900/50 relative z-10">
        <div class="p-5 border-b border-slate-800 flex justify-between items-center shadow-sm">
            <h1 class="text-lg font-semibold tracking-wide text-white">Studio<span class="text-blue-500">.ai</span></h1>
            <div id="conn-status" class="text-xs px-2 py-1 bg-green-500/20 text-green-400 rounded-full border border-green-500/30 flex items-center gap-1.5 transition-colors">
                <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
                Connected
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-5 space-y-6" id="chat-history">
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center font-bold text-sm shadow-[0_0_15px_rgba(37,99,235,0.5)] shrink-0">AI</div>
                <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none max-w-[85%] border border-slate-700/50 shadow-lg">
                    <p class="text-sm">Welcome to the Creative Studio. I'm connected to the Swarm. What are we building today?</p>
                </div>
            </div>
        </div>

        <div class="p-5 border-t border-slate-800 bg-slate-900">
            <div id="status-text" class="text-xs text-slate-400 mb-2 h-4 transition-opacity opacity-0 italic">Generating...</div>
            <div class="relative">
                <input type="text" id="prompt-input" class="w-full bg-slate-800 border border-slate-700 text-sm rounded-xl px-4 py-3 pr-12 focus:outline-none focus:border-blue-500 transition-colors shadow-inner text-white placeholder-slate-400" placeholder="Ask for a change...">
                <button id="send-btn" class="absolute right-2 top-2 bg-blue-600 hover:bg-blue-500 text-white p-1.5 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="w-2/3 flex flex-col relative canvas-bg">
        <div class="flex-1 p-8 flex items-center justify-center relative">
            <div id="canvas-container" class="relative group w-full h-full max-h-[75vh] rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-slate-700 transition-all duration-500 flex items-center justify-center">
                <div id="placeholder-text" class="absolute text-slate-500 font-medium tracking-widest uppercase text-sm z-0">Awaiting Prompt</div>
                <img id="main-image" src="" alt="" class="w-full h-full object-cover transition-opacity duration-500 opacity-0 relative z-10">
                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 z-20">
                    <div class="flex flex-col items-center gap-4">
                        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                        <span id="loading-text" class="text-sm font-medium text-blue-400 tracking-wider uppercase">Processing</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="h-24 glass-panel absolute bottom-8 left-8 right-8 rounded-2xl flex items-center px-6 gap-6 shadow-2xl z-30">
            <div class="flex flex-col gap-1">
                <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Style Engine</span>
                <div class="flex gap-2 overflow-x-auto pb-1" id="style-pills">
                    <button class="px-3 py-1.5 text-xs bg-blue-600/20 text-blue-400 border border-blue-500/50 rounded-lg font-medium transition whitespace-nowrap active-pill">Cinematic</button>
                    <button class="px-3 py-1.5 text-xs bg-slate-800 text-slate-300 border border-slate-700 rounded-lg hover:bg-slate-700 transition whitespace-nowrap">Digital Art</button>
                </div>
            </div>
            <div class="w-px h-10 bg-slate-700 mx-2 shrink-0"></div>
            <div class="flex flex-col gap-1 shrink-0">
                <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Aspect Ratio</span>
                <div class="flex gap-2" id="ar-pills">
                    <button class="px-3 py-1.5 text-xs bg-slate-800 text-slate-300 border border-slate-700 rounded-lg hover:bg-slate-700 transition">1:1</button>
                    <button class="px-3 py-1.5 text-xs bg-blue-600/20 text-blue-400 border border-blue-500/50 rounded-lg font-medium transition active-pill">16:9</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const chatHistory = document.getElementById('chat-history');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const mainImage = document.getElementById('main-image');
        const placeholderText = document.getElementById('placeholder-text');
        const statusText = document.getElementById('status-text');

        function appendMsg(role, text) {
            const isAI = role === 'AI';
            const msg = `
                <div class="flex items-start gap-3 ${isAI ? '' : 'flex-row-reverse'} opacity-0 translate-y-2 transition-all duration-300">
                    <div class="w-8 h-8 rounded-full ${isAI ? 'bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : 'bg-slate-700'} flex items-center justify-center font-bold text-sm shrink-0">${isAI ? 'AI' : 'U'}</div>
                    <div class="${isAI ? 'bg-slate-800 border border-slate-700/50 text-slate-200' : 'bg-blue-600 text-white'} p-3 rounded-2xl ${isAI ? 'rounded-tl-none' : 'rounded-tr-none'} max-w-[85%] shadow-lg">
                        <p class="text-sm">${text}</p>
                    </div>
                </div>`;
            chatHistory.insertAdjacentHTML('beforeend', msg);
            setTimeout(() => {
                chatHistory.lastElementChild.classList.remove('opacity-0', 'translate-y-2');
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 10);
        }

        function handleSend() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg('U', text);
            input.value = '';
            
            // UI Loading state
            loadingOverlay.classList.remove('opacity-0');
            mainImage.classList.add('scale-105', 'blur-sm'); 
            document.getElementById('canvas-container').classList.add('shimmer-bg');
            statusText.textContent = "Brainstorming creative direction...";
            statusText.classList.remove('opacity-0');

            setTimeout(() => {
                appendMsg('AI', "I'm generating a moody, cinematic cyberpunk city for you with high contrast neon lighting. I thought that would fit your request well.");
                statusText.textContent = "Generating image...";
                loadingText.textContent = "Generating...";
                
                setTimeout(() => {
                    const randomId = Math.floor(Math.random() * 1000);
                    mainImage.src = `https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop&sig=${randomId}`;
                    mainImage.onload = () => {
                        mainImage.classList.remove('opacity-0');
                        placeholderText.classList.add('opacity-0');
                        document.getElementById('canvas-container').classList.remove('shimmer-bg');
                        loadingOverlay.classList.add('opacity-0');
                        mainImage.classList.remove('scale-105', 'blur-sm');
                        statusText.classList.add('opacity-0');
                        
                        setTimeout(() => appendMsg('AI', 'Here it is! Should we add flying cars or maybe make it dawn?'), 500);
                    };
                }, 2000);
            }, 1000);
        }

        sendBtn.addEventListener('click', handleSend);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
