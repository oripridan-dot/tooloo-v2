# cloudbuild-crucible.yaml
# Serverless 5-cycle self-improvement crucible.
# Single step so pip install persists into the run.
steps:
  - name: 'python:3.11-slim'
    id: 'crucible'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "[*] Installing dependencies..."
        pip install --quiet --upgrade pip
        pip install --quiet -r requirements.txt
        pip install --quiet -e .
        echo "[*] Starting 5-cycle TooLoo Crucible..."
        python run_cycles.py --cycles 5
    env:
      - 'TOOLOO_LIVE_TESTS=1'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'

