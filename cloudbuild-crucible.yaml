# cloudbuild-crucible.yaml
# Serverless 5-cycle self-improvement crucible.
# Single step — installs from pyproject.toml then runs cycles.
steps:
  - name: 'python:3.12-slim'
    id: 'crucible'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        echo "[*] Installing system deps..."
        apt-get update -qq && apt-get install -y -qq git build-essential

        echo "[*] Installing Python dependencies from pyproject.toml..."
        pip install --quiet --upgrade pip setuptools wheel
        pip install --quiet -e ".[dev]"

        echo "[*] Starting 5-cycle TooLoo Crucible..."
        python run_cycles.py --cycles 5
        echo "[*] Crucible complete."
    env:
      - 'TOOLOO_LIVE_TESTS=1'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

timeout: '3600s'



