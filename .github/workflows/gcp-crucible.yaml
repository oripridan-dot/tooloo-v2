name: GCP Crucible Execution

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger allowed

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        version: '>= 363.0.0'

    - name: Submit Cloud Build Execution
      run: |
        # Submitting the build strictly into GCP Cloud Build environment
        # This executes the 5-round crucible remotely!
        gcloud builds submit --config=cloudbuild-job.yaml .
