name: TooLoo V4 — Cloud Crucible + CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      cycles:
        description: 'Number of self-improvement cycles to run'
        required: false
        default: '5'
      skip_deploy:
        description: 'Skip Cloud Run deploy (crucible only)'
        required: false
        default: 'false'

env:
  PROJECT_ID: too-loo-zi8g7e
  REGION: me-west1
  SERVICE: tooloo-v4-hub
  REGISTRY: gcr.io

jobs:
  # ── Job 1: Self-Improvement Crucible ──────────────────────────────────────
  crucible:
    name: Self-Improvement Crucible
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set metadata
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Run Crucible
        env:
          TOOLOO_LIVE_TESTS: '1'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ env.PROJECT_ID }}
        run: |
          CYCLES=${{ github.event.inputs.cycles || '5' }}
          echo "[*] Starting ${CYCLES}-cycle TooLoo crucible..."
          python run_cycles.py --cycles ${CYCLES}

      - name: Sync KnowledgeBank to GCS
        run: |
          if [ -f knowledge_lessons.json ]; then
            gsutil cp knowledge_lessons.json gs://too-loo-workspace-v4-${{ env.PROJECT_ID }}/knowledge_lessons.json
            echo "✓ KnowledgeBank synced to GCS"
          else
            echo "⚠ knowledge_lessons.json not found, skipping GCS sync"
          fi

      - name: Upload crucible report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crucible-report-${{ github.run_id }}
          path: cycle_run_report.json
          if-no-files-found: warn

  # ── Job 2: Build & Deploy to Cloud Run ────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: crucible
    # Only deploy on main push; skip if explicitly disabled
    if: github.ref == 'refs/heads/main' && github.event.inputs.skip_deploy != 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ needs.crucible.outputs.sha_short }}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          docker build --platform linux/amd64 -t "${IMAGE}" .
          echo "✓ Built: ${IMAGE}"

      - name: Push Docker image
        run: |
          docker push "${{ env.IMAGE }}"
          echo "✓ Pushed: ${{ env.IMAGE }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars=GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_REGION=${{ env.REGION }},CLOUD_NATIVE_WORKSPACE=true,GCS_KNOWLEDGE_PATH=gs://too-loo-workspace-v4-${{ env.PROJECT_ID }}/knowledge_lessons.json \
            --update-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --quiet

      - name: Health check + report URL
        run: |
          CLOUD_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --project=${{ env.PROJECT_ID }} --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "CLOUD_URL=${CLOUD_URL}" >> $GITHUB_ENV
          
          echo "## 🚀 Sovereign Hub Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${CLOUD_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE }}" >> $GITHUB_STEP_SUMMARY
          
          # Health gate
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "${CLOUD_URL}/health" --max-time 20 || echo "000")
          if [[ "${HTTP}" == "200" ]]; then
            echo "- **Health**: ✅ PASS (HTTP ${HTTP})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Health**: ❌ FAIL (HTTP ${HTTP})" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
