<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Sandbox | TooLoo V4 Pillar IV</title>
    <style>
        :root {
            --bg-deep: #020205;
            --sidebar-bg: rgba(10, 10, 20, 0.8);
            --accent-primary: #8a2be2;
            --accent-secondary: #00d4ff;
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: var(--bg-deep);
            color: #ccc;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar / Explorer */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(40px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 10;
        }

        .sidebar-header {
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--accent-secondary);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
        }

        .sidebar-header .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px #00ff00;
        }

        .manifest-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        .manifest-item {
            padding: 12px 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }

        .manifest-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent-primary);
        }

        .manifest-item.active {
            background: rgba(138, 43, 226, 0.15);
            border-color: var(--accent-primary);
            color: #fff;
        }

        /* Editor Area */
        .editor-pane {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            border-right: 1px solid var(--glass-border);
        }

        .editor-header {
            height: 48px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        #code-editor {
            flex-grow: 1;
            padding: 30px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            color: #8b949e;
            white-space: pre;
            overflow: auto;
            outline: none;
        }

        /* Preview (Manifestation) Pane */
        .preview-pane {
            width: 45%;
            background: #050505;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .preview-header {
            height: 48px;
            background: linear-gradient(90deg, rgba(138, 43, 226, 0.1), transparent);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #manifestation-viewport {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        /* Stats Overlay */
        .stats-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 0.65rem;
            color: var(--accent-secondary);
            font-family: var(--font-mono);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="status-dot"></span>
                HUB: SOVEREIGN_V4
            </div>
            
            <div class="manifest-list" id="manifest-list">
                <div class="manifest-item active">
                    spectral_controller.html
                </div>
                <!-- Buddy will push new manifests here -->
            </div>

            <div style="font-size: 0.6rem; opacity: 0.3; margin-top: auto;">
                PILLAR_IV: MANIFESTATION_SANDBOX
            </div>
        </aside>

        <!-- Editor -->
        <main class="editor-pane">
            <div class="editor-header">EDITOR: T3:ARCH_PURITY</div>
            <div id="code-editor" contenteditable="true">
                <!-- Live Code Injection -->
            </div>
        </main>

        <!-- Preview -->
        <section class="preview-pane">
            <div class="preview-header">LIVE_MANIFESTATION_PULSE</div>
            <iframe id="manifestation-viewport"></iframe>
            
            <div class="stats-overlay">
                FPS: 60 | LATENCY: 2.3ms | ROI: +0.00
            </div>
        </section>
    </div>

    <script src="sandbox_logic.js"></script>
</body>
</html>
