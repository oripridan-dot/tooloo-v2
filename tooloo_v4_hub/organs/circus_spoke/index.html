<body>
    <div id="overlay-hud">
        <h1>Sovereign Sanctum</h1>
        <div id="status-bar">

    <div id="chat-hud"></div>

    <div id="planning-hud">

        <div class="planning-stat">

            <div class="planning-bar-bg"><div id="bar-compl" class="planning-bar-fill" style="background: #00ff88; box-shadow: 0 0 10px #00ff88;"></div></div>
        </div>
        <div class="planning-stat">
            <div class="planning-label">Foresight</div>

    <div id="canvas-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIG (Architectural Logic: Simple to Adjust) ---
        const CONFIG = {
            bloom: 1.5,
            exposure: 1.0,
            fog_near: 1,
            fog_far: 3000,
            ambient_color: 0x4040ff,
            ambient_intensity: 0.5,
            point_color: 0xffcc00,
            point_intensity: 3.0,
            grid_active: true
        };

        // --- Core ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, CONFIG.fog_near, CONFIG.fog_far);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 50, 150);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Environment Update Logic ---
        function updateEnvironment(settings) {
            Object.assign(CONFIG, settings);
            if (settings.ambient_color !== undefined) ambient.color.setHex(settings.ambient_color);
            if (settings.ambient_intensity !== undefined) ambient.intensity = settings.ambient_intensity;
            if (settings.point_color !== undefined) point.color.setHex(settings.point_color);
            if (settings.point_intensity !== undefined) point.intensity = settings.point_intensity;
            if (settings.fog_near !== undefined) scene.fog.near = settings.fog_near;
            if (settings.fog_far !== undefined) scene.fog.far = settings.fog_far;
            if (settings.exposure !== undefined) renderer.toneMappingExposure = settings.exposure;
            if (settings.grid === false) grid.visible = false;
            if (settings.grid === true) grid.visible = true;
            
            // Visual feedback of shift
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.style.color = '#ffcc00';
            line.innerText = `> ATMOSPHERE_SYNC: ${JSON.stringify(settings)}`;
            document.getElementById('thought-hud').prepend(line);
        }

        // --- Soul Cloud (Engram Particles) ---
        const soulGeometry = new THREE.BufferGeometry();
        const soulCount = 500;
        const soulPos = new Float32Array(soulCount * 3);
        for(let i=0; i<soulCount*3; i++) soulPos[i] = (Math.random() - 0.5) * 300;
        soulGeometry.setAttribute('position', new THREE.BufferAttribute(soulPos, 3));
        const soulMaterial = new THREE.PointsMaterial({ color: 0x00ccff, size: 0.5, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const soulCloud = new THREE.Points(soulGeometry, soulMaterial);
        scene.add(soulCloud);

        // --- Ethereal Voice Synth ---
        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new AudioContext(); };
        const playSovereignChirp = (freq, duration = 0.1) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        };

        // --- Architectural Crucible (Lived-in Luxury) ---
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.2 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.6 });
        const base = new THREE.Mesh(new THREE.CylinderGeometry(150, 160, 5, 64), stoneMat);
        base.position.y = -2.5; scene.add(base);
        
        // --- SOTA Material Registry (V4 PBR) ---
        const materialRegistry = {
            marble: new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, transmission: 0.4, thickness: 2, clearcoat: 1 }),
            basalt: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.1 }),
            steel: new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.2, clearcoat: 0.5 }),
            obsidian: new THREE.MeshPhysicalMaterial({ color: 0x111111, roughness: 0, transmission: 0.9, ior: 1.5, thickness: 1.5 }),
            gold: new THREE.MeshPhysicalMaterial({ color: 0xffcc00, metalness: 1, roughness: 0.1, clearcoat: 1 }),
            jade: new THREE.MeshPhysicalMaterial({ color: 0x00ff88, roughness: 0.1, transmission: 0.5, thickness: 1 }),
            ruby: new THREE.MeshPhysicalMaterial({ color: 0xff3300, roughness: 0.1, transmission: 0.5, thickness: 1 }),
            oak: new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.7 })
        };
        const createArch = (x, z, r) => {
            const arch = new THREE.Group();
            const p = new THREE.Mesh(new THREE.BoxGeometry(8, 120, 8), woodMat);
            p.position.set(-40, 60, 0); arch.add(p);
            const p2 = p.clone(); p2.position.set(40, 60, 0); arch.add(p2);
            arch.position.set(x, 0, z); arch.rotation.y = r; scene.add(arch);
        };
        createArch(80, 0, Math.PI/2); createArch(-80, 0, -Math.PI/2);

        // --- Buddy (Conversational Architect) ---
        class Buddy {
            constructor() {
                this.group = new THREE.Group();
                this.material = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.8, emissive: 0xffaa00, emissiveIntensity: 0.3 });
                this.torso = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 2), this.material);
                this.head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), this.material);
                this.head.position.y = 3.5; this.group.add(this.torso, this.head);
                this.lArm = this.createLimb(2, 1.5); this.rArm = this.createLimb(-2, 1.5);
                this.lLeg = this.createLimb(1, -2); this.rLeg = this.createLimb(-1, -2);
                scene.add(this.group);
                // Thought Cloud
                this.thoughtSprite = this.createLabel(""); this.thoughtSprite.position.y = 8; this.group.add(this.thoughtSprite);
                // Spectral Ring (Audio-Viz)
                this.ring = new THREE.Mesh(new THREE.TorusGeometry(6, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.3 }));
                this.ring.rotation.x = Math.PI / 2; this.group.add(this.ring);
            }
            createLimb(x, y) {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 4), this.material);
                l.position.set(x, y, 0); this.group.add(l); return l;
            }
            createLabel(text) {
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,512,128);
                ctx.font = '24px Outfit'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
                ctx.fillText(text, 256, 64);
                const tex = new THREE.CanvasTexture(canvas);
                return new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            }
            updateThought(text) {
                const canvas = this.thoughtSprite.material.map.image;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,512,128); 
                // Enhanced readability for Thought Cloud
                ctx.font = 'bold 36px Outfit'; ctx.fillStyle = '#00ccff';
                ctx.fillText(text, 256, 64);
                this.thoughtSprite.material.map.needsUpdate = true;
                this.thoughtSprite.scale.set(18, 5, 1);
                // HUD notification
                addChatMessage(`[Sovereign Thought]: ${text}`, 'buddy');
            }
            applyPose(pose) {
                if (!pose || !pose.joints) return;
                this.group.position.set(pose.pos.x, pose.pos.y, pose.pos.z);
                this.group.rotation.y = pose.rot_y;
                const j = pose.joints;
                this.lLeg.rotation.x = j.lLeg; this.rLeg.rotation.x = j.rLeg;
                this.lArm.rotation.x = j.lArm; this.rArm.rotation.x = j.rArm;
                this.head.rotation.x = j.head_x; this.head.rotation.y = j.head_y;
                if (pose.speaking || pose.vitality > 1.2) {
                    this.material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.02)*0.3;
                    this.ring.scale.setScalar(1 + Math.sin(Date.now()*0.01)*0.2);
                    this.ring.material.opacity = 0.3 + Math.sin(Date.now()*0.01)*0.2;
                    if (pose.speaking && Math.random() > 0.7) playSovereignChirp(440 + Math.random()*440, 0.05);
                } else { 
                    this.material.emissiveIntensity = 0.3; 
                    this.ring.scale.setScalar(THREE.MathUtils.lerp(this.ring.scale.x, 1, 0.1));
                    this.ring.material.opacity = 0.1;
                }
            }
        }
        const buddy = new Buddy();
        const shards = new Map();

        // --- Interaction: Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Array.from(shards.values()));
            if (intersects.length > 0) {
                const shard = intersects[0].object;
                addChatMessage(`[Sovereign Grounding]: Exploring ${shard.name} principals...`, 'buddy');
            }
        });

        // --- Interaction ---
        function addThought(text) {
            const hud = document.getElementById('thought-hud');
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.innerText = `> ${text}`;
            hud.prepend(line);
            if (hud.childElementCount > 10) hud.removeChild(hud.lastChild);
            buddy.updateThought(text.substring(0, 30));
        }

        function addChatMessage(msg, role) {
            const hud = document.getElementById('chat-hud');
            const item = document.createElement('div');
            item.className = `chat-msg ${role}`;
            item.innerText = msg;
            hud.appendChild(item); hud.scrollTop = hud.scrollHeight;
            // Removed recursive call to buddy.updateThought to prevent stack overflow
        }

        const input = document.getElementById('command-input');
        input.addEventListener('keydown', (e) => {
            initAudio();
            if (e.key === 'Enter') {
                const val = input.value;
                if (val.startsWith("/")) {
                    ws.send(JSON.stringify({ type: "user_goal", goal: val.substring(1) }));
                } else {
                    addChatMessage(val, 'user');
                    ws.send(JSON.stringify({ type: "user_chat", message: val }));
                }
                input.value = '';
            }
        });

        // --- Lights & Loop ---
        const ambient = new THREE.AmbientLight(CONFIG.ambient_color, CONFIG.ambient_intensity);
        scene.add(ambient);
        
        const point = new THREE.PointLight(CONFIG.point_color, CONFIG.point_intensity, 500);
        point.position.set(50, 100, 50);
        scene.add(point);

        const grid = new THREE.GridHelper(1000, 100, 0x111111, 0x050505);
        grid.position.y = -2.6;
        scene.add(grid);

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); renderer.render(scene, camera);
        }
        animate();

        // --- WebSocket Resiliency ---
        let ws;
        let reconnectDelay = 1000;
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            ws.onopen = () => {
                console.log("Sovereign Link: ESTABLISHED");
                statusDot.style.background = "#00ff88";
                statusDot.style.boxShadow = "0 0 20px #00ff88";
                statusText.innerText = "CONVERSATIONAL MODE | ACTIVE";
                reconnectDelay = 1000;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'pose_update') {
                        buddy.applyPose(data);
                        
                        // Sovereign Pulse Mapping
                        if (data.vitality_index !== undefined) {
                            document.documentElement.style.setProperty('--hub-vitality', data.vitality_index);
                            document.documentElement.style.setProperty('--hub-drift', data.drift);
                            
                            const spark = document.getElementById('vitality-spark');
                            spark.style.width = (data.vitality_index * 100) + "px";
                            spark.style.opacity = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
                            
                            // Soul Cloud reaction
                            soulCloud.rotation.y += data.drift * 0.1;
                            soulMaterial.opacity = 0.2 + data.vitality_index * 0.4;
                            if (data.sync_active) soulMaterial.color.setHex(0xffcc00);
                        }

                        if (data.current_thought && data.current_thought !== buddy.lastText) {
                            addThought(data.current_thought);
                            buddy.lastText = data.current_thought;
                        }
                    }
                    else if (data.type === 'buddy_chat') addChatMessage(data.response, 'buddy');
                    else if (data.type === 'status_update') statusText.innerText = data.status;
                    else if (data.type === 'inner_thought') addThought(data.thought);
                    else if (data.type === 'scaling_pulse') {
                        const count = data.active_tasks;
                        if (count > 1) {
                            statusText.innerText = `HYPER-SCALE | ${count} PARALLEL TASKS`;
                            statusText.style.color = "#ffcc00";
                            // Accelerate Soul Cloud
                            soulCloud.rotation.y += 0.5; 
                            document.documentElement.style.setProperty('--hub-drift', count * 0.1);
                        } else {
                            statusText.innerText = "CONVERSATIONAL MODE | ACTIVE";
                            statusText.style.color = "#fff";
                            document.documentElement.style.setProperty('--hub-drift', 0);
                        }
                    }
                    else if (data.type === 'value_update') {
                        const hud = document.getElementById('planning-hud');
                        hud.style.display = 'flex';
                        document.getElementById('total-value-score').innerText = data.score.total.toFixed(2);
                        document.getElementById('bar-user').style.width = (data.score.user * 100) + '%';
                        document.getElementById('bar-compl').style.width = (data.score.compliance * 100) + '%';
                        document.getElementById('bar-fore').style.width = (data.score.foresight * 100) + '%';
                        if (data.score.total >= 0.75) playSovereignChirp(880, 0.05); // High value chirp
                    }
                    else if (data.type === 'manifest_shard') {
                        const mat = materialRegistry[data.material] || materialRegistry.oak;
                        const geom = data.material === 'obsidian' ? new THREE.OctahedronGeometry(6, 0) : new THREE.IcosahedronGeometry(4, 1);
                        const shard = new THREE.Mesh(geom, mat);
                        shard.position.set(data.pos.x, data.pos.y, data.pos.z);
                        shard.name = data.id;
                        
                        // Add Label
                        const label = buddy.createLabel(data.id);
                        label.position.set(0, 8, 0);
                        label.scale.set(12, 3, 1);
                        shard.add(label);
                        
                        scene.add(shard); shards.set(data.id, shard);
                    }
                    else if (data.type === 'drift_pulse') {
                        const shard = shards.get(data.id.split("/").pop());
                        if (shard) {
                            const pulseGeom = new THREE.SphereGeometry(shard.geometry.parameters.radius * 1.5, 32, 32);
                            const pulseMat = new THREE.MeshBasicMaterial({ color: parseInt(data.color), transparent: true, opacity: 0.5 });
                            const pulse = new THREE.Mesh(pulseGeom, pulseMat);
                            shard.add(pulse);
                            
                            // Animate outward and fade
                            new Promise(resolve => {
                                let scale = 1;
                                const iv = setInterval(() => {
                                    scale += 0.1; pulse.scale.setScalar(scale);
                                    pulse.material.opacity -= 0.05;
                                    if (pulse.material.opacity <= 0) {
                                        shard.remove(pulse); clearInterval(iv); resolve();
                                    }
                                }, 50);
                            });
                        }
                    }
                    else if (data.type === 'environment_update') {
                        updateEnvironment(data.settings);
                    }
                } catch (e) { console.error("Telemetry Error:", e); }
            };

            ws.onclose = () => {
                console.warn(`Sovereign Link: LOST. Reconnecting in ${reconnectDelay}ms...`);
                statusDot.style.background = "#ffcc00";
                statusDot.style.boxShadow = "0 0 20px #ffcc00";
                statusText.innerText = "RECONNECTING TO HUB...";
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, 30000);
            };

            ws.onerror = (err) => { ws.close(); };
        }
        connect();
    </script>
