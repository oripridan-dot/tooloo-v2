steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tooloo-v2-crucible:$COMMIT_SHA', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tooloo-v2-crucible:$COMMIT_SHA']

  # Create or update the Cloud Run Job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'tooloo-crucible-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tooloo-v2-crucible:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--command'
      - 'python'
      - '--args'
      - 'run_cycles.py,--cycles,5'
      - '--set-env-vars'
      - 'TOOLOO_LIVE_TESTS=1'
      - '--memory'
      - '4Gi'
      - '--cpu'
      - '2'
      - '--task-timeout'
      - '3600s' # 1 hour timeout for deep thinking

  # Execute the Cloud Run Job strictly in the cloud environment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'jobs'
      - 'execute'
      - 'tooloo-crucible-job'
      - '--region'
      - 'us-central1'
      - '--wait' # Wait for execution to finish

images:
  - 'gcr.io/$PROJECT_ID/tooloo-v2-crucible:$COMMIT_SHA'
