<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TooLoo V3.2 | Conversational Sanctum</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Outfit', sans-serif; color: #fff; }
        #canvas-container { width: 100vw; height: 100vh; cursor: crosshair; }
        
        #overlay-hud {
            position: absolute; top: 30px; left: 30px;
            background: rgba(10, 10, 10, 0.45);
            backdrop-filter: blur(80px);
            padding: 35px; border-radius: 30px;
            border: 1px solid rgba(255, 204, 0, 0.2);
            user-select: none; pointer-events: none;
            box-shadow: 0 24px 128px rgba(0, 0, 0, 1);
            max-width: 360px; z-index: 10;
        }

        #chat-hud {
            position: absolute; top: 30px; right: 30px;
            width: 400px; height: calc(100vh - 180px);
            background: rgba(10, 10, 10, 0.2);
            backdrop-filter: blur(40px);
            border-radius: 30px; border: 1px solid rgba(0, 204, 255, 0.1);
            padding: 24px; display: flex; flex-direction: column;
            overflow-y: auto; z-index: 10;
        }
        .chat-msg { margin-bottom: 25px; font-size: 18px; line-height: 1.6; }
        .chat-msg.user { text-align: right; color: #ffcc00; font-weight: 600; }
        .chat-msg.buddy { 
            border-left: 5px solid #00ccff; padding: 15px 20px; 
            color: #fff; background: rgba(0, 204, 255, 0.05);
            border-radius: 0 15px 15px 0;
        }

        #command-hud {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            width: 700px; background: rgba(20, 15, 5, 0.7);
            backdrop-filter: blur(80px); border-radius: 70px;
            border: 1px solid rgba(255, 204, 0, 0.3);
            padding: 24px 50px;
            box-shadow: 0 0 120px rgba(255, 204, 0, 0.15);
            z-index: 10;
        }
        #command-input {
            background: transparent; border: none; color: #ffcc00;
            font-family: inherit; font-size: 22px; width: 100%;
            outline: none; letter-spacing: 2px;
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 12px; text-transform: uppercase; color: #ffcc00; }
        #status-bar { margin-top: 20px; font-size: 11px; letter-spacing: 4px; display: flex; align-items: center; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; margin-right: 12px; box-shadow: 0 0 15px #00ff88; }
        
        #thought-hud { 
            margin-top: 40px; font-family: 'JetBrains Mono'; font-size: 12px; color: #00ccff;
            max-height: 200px; overflow: hidden; opacity: 0.8;
            border-top: 1px solid rgba(0, 204, 255, 0.2); padding-top: 20px;
        }
        .thought-line { margin-bottom: 8px; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .log { margin-top: 35px; font-family: 'JetBrains Mono'; font-size: 11px; max-height: 120px; overflow: hidden; opacity: 0.4; }
    </style>
</head>
<body>
    <div id="overlay-hud">
        <h1>Sovereign Sanctum</h1>
        <div id="status-bar">
            <div id="status-dot"></div>
            <span id="status-text">CONVERSATIONAL MODE | ACTIVE</span>
        </div>
        <div id="thought-hud" class="thought-scroll"></div>
        <div id="log-container" class="log"></div>
    </div>

    <div id="chat-hud"></div>

    <div id="command-hud">
        <input type="text" id="command-input" placeholder="Converse with Buddy..." autocomplete="off">
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Core ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
        camera.position.set(0, 50, 150);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);

        // --- Ethereal Voice Synth ---
        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new AudioContext(); };
        const playSovereignChirp = (freq, duration = 0.1) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + duration);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        };

        // --- Architectural Crucible (Lived-in Luxury) ---
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.2 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.6 });
        const base = new THREE.Mesh(new THREE.CylinderGeometry(150, 160, 5, 64), stoneMat);
        base.position.y = -2.5; scene.add(base);
        
        // --- SOTA Material Registry (V4 PBR) ---
        const materialRegistry = {
            marble: new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, transmission: 0.4, thickness: 2, clearcoat: 1 }),
            basalt: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9, metalness: 0.1 }),
            steel: new THREE.MeshPhysicalMaterial({ color: 0xcccccc, metalness: 1, roughness: 0.2, clearcoat: 0.5 }),
            obsidian: new THREE.MeshPhysicalMaterial({ color: 0x111111, roughness: 0, transmission: 0.9, ior: 1.5, thickness: 1.5 }),
            oak: new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.7 })
        };
        const createArch = (x, z, r) => {
            const arch = new THREE.Group();
            const p = new THREE.Mesh(new THREE.BoxGeometry(8, 120, 8), woodMat);
            p.position.set(-40, 60, 0); arch.add(p);
            const p2 = p.clone(); p2.position.set(40, 60, 0); arch.add(p2);
            arch.position.set(x, 0, z); arch.rotation.y = r; scene.add(arch);
        };
        createArch(80, 0, Math.PI/2); createArch(-80, 0, -Math.PI/2);

        // --- Buddy (Conversational Architect) ---
        class Buddy {
            constructor() {
                this.group = new THREE.Group();
                this.material = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.8, emissive: 0xffaa00, emissiveIntensity: 0.3 });
                this.torso = new THREE.Mesh(new THREE.IcosahedronGeometry(1.8, 2), this.material);
                this.head = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), this.material);
                this.head.position.y = 3.5; this.group.add(this.torso, this.head);
                this.lArm = this.createLimb(2, 1.5); this.rArm = this.createLimb(-2, 1.5);
                this.lLeg = this.createLimb(1, -2); this.rLeg = this.createLimb(-1, -2);
                scene.add(this.group);
                // Thought Cloud
                this.thoughtSprite = this.createLabel(""); this.thoughtSprite.position.y = 8; this.group.add(this.thoughtSprite);
                // Spectral Ring (Audio-Viz)
                this.ring = new THREE.Mesh(new THREE.TorusGeometry(6, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.3 }));
                this.ring.rotation.x = Math.PI / 2; this.group.add(this.ring);
            }
            createLimb(x, y) {
                const l = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 4), this.material);
                l.position.set(x, y, 0); this.group.add(l); return l;
            }
            createLabel(text) {
                const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,512,128);
                ctx.font = '24px Outfit'; ctx.fillStyle = '#ffffff'; ctx.textAlign = 'center';
                ctx.fillText(text, 256, 64);
                const tex = new THREE.CanvasTexture(canvas);
                return new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            }
            updateThought(text) {
                const canvas = this.thoughtSprite.material.map.image;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,512,128); 
                // Enhanced readability for Thought Cloud
                ctx.font = 'bold 36px Outfit'; ctx.fillStyle = '#00ccff';
                ctx.fillText(text, 256, 64);
                this.thoughtSprite.material.map.needsUpdate = true;
                this.thoughtSprite.scale.set(18, 5, 1);
                // HUD notification
                addChatMessage(`[Sovereign Thought]: ${text}`, 'buddy');
            }
            applyPose(pose) {
                if (!pose || !pose.joints) return;
                this.group.position.set(pose.pos.x, pose.pos.y, pose.pos.z);
                this.group.rotation.y = pose.rot_y;
                const j = pose.joints;
                this.lLeg.rotation.x = j.lLeg; this.rLeg.rotation.x = j.rLeg;
                this.lArm.rotation.x = j.lArm; this.rArm.rotation.x = j.rArm;
                this.head.rotation.x = j.head_x; this.head.rotation.y = j.head_y;
                if (pose.speaking || pose.vitality > 1.2) {
                    this.material.emissiveIntensity = 0.5 + Math.sin(Date.now()*0.02)*0.3;
                    this.ring.scale.setScalar(1 + Math.sin(Date.now()*0.01)*0.2);
                    this.ring.material.opacity = 0.3 + Math.sin(Date.now()*0.01)*0.2;
                    if (pose.speaking && Math.random() > 0.7) playSovereignChirp(440 + Math.random()*440, 0.05);
                } else { 
                    this.material.emissiveIntensity = 0.3; 
                    this.ring.scale.setScalar(THREE_Math_Lerp(this.ring.scale.x, 1, 0.1));
                    this.ring.material.opacity = 0.1;
                }
            }
        }
        const buddy = new Buddy();
        const shards = new Map();

        // --- Interaction: Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Array.from(shards.values()));
            if (intersects.length > 0) {
                const shard = intersects[0].object;
                addChatMessage(`[Sovereign Grounding]: Exploring ${shard.name} principals...`, 'buddy');
            }
        });

        // --- Interaction ---
        function addThought(text) {
            const hud = document.getElementById('thought-hud');
            const line = document.createElement('div');
            line.className = 'thought-line';
            line.innerText = `> ${text}`;
            hud.prepend(line);
            if (hud.childElementCount > 10) hud.removeChild(hud.lastChild);
            buddy.updateThought(text.substring(0, 30));
        }

        function addChatMessage(msg, role) {
            const hud = document.getElementById('chat-hud');
            const item = document.createElement('div');
            item.className = `chat-msg ${role}`;
            item.innerText = msg;
            hud.appendChild(item); hud.scrollTop = hud.scrollHeight;
            if (role === 'buddy') buddy.updateThought(msg.substring(0, 30) + "...");
        }

        const input = document.getElementById('command-input');
        input.addEventListener('keydown', (e) => {
            initAudio();
            if (e.key === 'Enter') {
                const val = input.value;
                if (val.startsWith("/")) {
                    ws.send(JSON.stringify({ type: "user_goal", goal: val.substring(1) }));
                } else {
                    addChatMessage(val, 'user');
                    ws.send(JSON.stringify({ type: "user_chat", message: val }));
                }
                input.value = '';
            }
        });

        // --- Lights & Loop ---
        scene.add(new THREE.AmbientLight(0x4040ff, 0.5));
        const point = new THREE.PointLight(0xffcc00, 3, 500); point.position.set(50, 100, 50); scene.add(point);

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); renderer.render(scene, camera);
        }
        animate();

        // --- WebSocket Resiliency ---
        let ws;
        let reconnectDelay = 1000;
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            ws.onopen = () => {
                console.log("Sovereign Link: ESTABLISHED");
                statusDot.style.background = "#00ff88";
                statusDot.style.boxShadow = "0 0 20px #00ff88";
                statusText.innerText = "CONVERSATIONAL MODE | ACTIVE";
                reconnectDelay = 1000;
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'pose_update') {
                        buddy.applyPose(data);
                        if (data.current_thought && data.current_thought !== buddy.lastText) {
                            addThought(data.current_thought);
                            buddy.lastText = data.current_thought;
                        }
                    }
                    else if (data.type === 'buddy_chat') addChatMessage(data.response, 'buddy');
                    else if (data.type === 'status_update') statusText.innerText = data.status;
                    else if (data.type === 'inner_thought') addThought(data.thought);
                    else if (data.type === 'manifest_shard') {
                        const mat = materialRegistry[data.material] || materialRegistry.oak;
                        const geom = new THREE.IcosahedronGeometry(4, 1);
                        const shard = new THREE.Mesh(geom, mat);
                        shard.position.set(data.pos.x, data.pos.y, data.pos.z);
                        shard.name = data.id;
                        scene.add(shard); shards.set(data.id, shard);
                    }
                } catch (e) { console.error("Telemetry Error:", e); }
            };

            ws.onclose = () => {
                console.warn(`Sovereign Link: LOST. Reconnecting in ${reconnectDelay}ms...`);
                statusDot.style.background = "#ffcc00";
                statusDot.style.boxShadow = "0 0 20px #ffcc00";
                statusText.innerText = "RECONNECTING TO HUB...";
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, 30000);
            };

            ws.onerror = (err) => { ws.close(); };
        }
        connect();
    </script>
</body>
</html>
