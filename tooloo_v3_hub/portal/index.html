<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SOVEREIGN_PULSE_V2.1.20260401.0109 -->
    <title>Buddy V2.0 | Sovereign Nexus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="nexus-theme">
    <div id="nexus-app">
        <!-- Main: Conversational Partner -->
        <main id="chat-column">
            <header id="nexus-header">
                <div class="buddy-status">
                    <span class="status-dot pulsing"></span>
                    <span class="buddy-id">BUDDY_AUTOPOIETIC_V2.0</span>
                </div>
                <div class="jit-indicators" id="active-indicators">
                    <!-- JIT Status Pills appear here -->
                </div>
            </header>

            <div id="conversation-viewport">
                <!-- Buddy's greeting -->
                <div class="message buddy initial">
                    <div class="msg-content">
                        <p>Architect, the Nexus is synchronized. I am proactively monitoring the SOTA landscape and your system's engrams. How shall we evolve the Sovereign Hub today?</p>
                    </div>
                </div>
            </div>

            <footer id="input-nexus">
                <div class="input-container">
                    <textarea id="nexus-input" placeholder="Coordinate with Buddy (or type / for commands)..." rows="1"></textarea>
                    <div class="input-actions">
                        <button id="send-trigger" disabled>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </footer>
        </main>

        <!-- Right: Cognitive Enrichment Sidebar (JIT Only) -->
        <aside id="cognitive-sidebar" class="hidden">
            <div class="sidebar-header">
                <h3>COGNITIVE_ENRICHMENT</h3>
                <button id="close-sidebar">✕</button>
            </div>
            <div id="shard-container">
                <!-- JIT Cognitive Shards (SOTA, Suggestions, Audit results) -->
            </div>
        </aside>
    </div>

    <!-- Template for Proactive Shards -->
    <template id="shard-template">
        <div class="enrichment-shard">
            <header>
                <span class="shard-type">TYPE</span>
                <span class="shard-time">JIT_STAMP</span>
            </header>
            <div class="shard-body"></div>
            <div class="shard-actions"></div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
